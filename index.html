<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kamstampwa - Pohara Ayub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* M3 Purple Theme Tokens */
            --md-sys-color-primary: #6750a4;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #eaddff;
            --md-sys-color-on-primary-container: #21005d;
            --md-sys-color-secondary-container: #e8def8;
            --md-sys-color-on-secondary-container: #1d192b;
            --md-sys-color-surface: #fef7ff;
            --md-sys-color-on-surface: #1d1b20;
            --md-sys-color-surface-variant: #e7e0eb;
            --md-sys-color-outline: #79747e;
            --md-sys-color-surface-container: #f3edf7;
            --md-sys-color-surface-container-high: #ece6f0;
            --md-sys-color-error: #b3261e;
            --md-sys-color-error-container: #f9dedc;
            --md-sys-color-on-error-container: #410e0b;
            --md-sys-elevation-3: 0px 4px 8px 3px rgba(0, 0, 0, 0.1), 0px 1px 3px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- LOADING ANIMATION STYLES --- */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(29, 27, 32, 0.7); /* Scrim color */
            backdrop-filter: blur(4px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            color: white;
            gap: 20px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--md-sys-color-primary-container);
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* -------------------------------- */

        .warning-banner {
            background-color: var(--md-sys-color-error-container);
            color: var(--md-sys-color-on-error-container);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            font-weight: 500;
            border-bottom: 1px solid rgba(179, 38, 30, 0.1);
            z-index: 1000;
        }

        .scroll-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px 160px 16px;
        }

        .m3-card {
            background-color: var(--md-sys-color-surface-container);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 16px;
        }

        .m3-input-container {
            position: relative;
            background-color: var(--md-sys-color-surface-container-high);
            border-radius: 12px 12px 4px 4px;
            border-bottom: 2px solid var(--md-sys-color-outline);
            padding: 8px 16px;
            margin-bottom: 16px;
        }
        .m3-input-container:focus-within { border-bottom-color: var(--md-sys-color-primary); }
        .m3-input { background: transparent; border: none; width: 100%; padding: 8px 0; font-size: 16px; outline: none; color: var(--md-sys-color-on-surface); }
        .m3-label { font-size: 12px; color: var(--md-sys-color-primary); font-weight: 500; }

        /* M3 FAB ICON ONLY STYLE */
        .m3-fab-floating {
            position: fixed;
            bottom: 104px;
            right: 24px;
            width: 56px;
            height: 56px;
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--md-sys-elevation-3);
            border: none;
            cursor: pointer;
            z-index: 50;
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
        }
        .m3-fab-floating:active {
            transform: scale(0.9);
            box-shadow: none;
        }
        .m3-fab-floating:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .photo-chip {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 1;
            background-color: var(--md-sys-color-surface-variant);
        }
        .delete-badge {
            position: absolute;
            top: 6px; right: 6px;
            background: var(--md-sys-color-error);
            color: white; width: 28px; height: 28px;
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            z-index: 10;
        }

        /* Navigasi Bawah Spek M3 2026 */
        .bottom-nav {
            height: 80px;
            background-color: var(--md-sys-color-surface-container);
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 100;
            border-top: 1px solid var(--md-sys-color-surface-variant);
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; flex: 1; cursor: pointer; position: relative;
            color: var(--md-sys-color-on-surface-variant);
            text-decoration: none;
            transition: color 0.2s cubic-bezier(0.2, 0, 0, 1);
        }
        .icon-container {
            position: relative; 
            width: 64px; 
            height: 32px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            margin-bottom: 4px;
        }
        .nav-indicator {
            position: absolute; 
            inset: 0;
            background-color: var(--md-sys-color-secondary-container);
            border-radius: 16px; 
            opacity: 0; 
            transform: scaleX(0.5);
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
        }
        .nav-icon { 
            position: relative; 
            z-index: 1; 
            transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1);
        }
        
        .nav-item.active .nav-indicator { opacity: 1; transform: scaleX(1); }
        .nav-item.active .nav-icon { transform: scale(1.05); color: var(--md-sys-color-on-secondary-container); }
        .nav-item.active { color: var(--md-sys-color-on-surface); font-weight: 700; }

        .nav-icon .filled { display: none; }
        .nav-item.active .nav-icon .outlined { display: none; }
        .nav-item.active .nav-icon .filled { display: block; }

        .nav-label {
            font-size: 12px;
            letter-spacing: 0.1px;
            line-height: 16px;
        }

        #loadingBar {
            position: fixed; top: 0; left: 0; height: 4px;
            background: var(--md-sys-color-primary);
            width: 0%; transition: width 0.3s; z-index: 1100;
        }

        .clear-btn {
            background-color: var(--md-sys-color-error);
            color: white; padding: 4px 12px; border-radius: 8px;
            font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 4px;
        }

        .backup-badge {
            font-size: 9px;
            color: var(--md-sys-color-primary);
            background: var(--md-sys-color-primary-container);
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 4px;
            transition: all 0.2s ease;
        }
        .backup-badge.disabled {
            background: var(--md-sys-color-surface-variant);
            color: var(--md-sys-color-outline);
        }

        /* M3 Switch Style */
        .m3-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .m3-switch input { opacity: 0; width: 0; height: 0; }
        .m3-slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: var(--md-sys-color-outline);
            transition: .4s;
            border-radius: 24px;
            border: 2px solid var(--md-sys-color-outline);
        }
        .m3-slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .m3-slider {
            background-color: var(--md-sys-color-primary);
            border-color: var(--md-sys-color-primary);
        }
        input:checked + .m3-slider:before {
            transform: translateX(20px);
            background-color: var(--md-sys-color-on-primary);
        }
    </style>
</head>

    <script>
        const { jsPDF } = window.jspdf;
        const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
        const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];

        let pdfPhotos = [];
        let stampPhotos = [];
        let isBackupEnabled = true;

        document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];

        window.onbeforeunload = function() {
            if (pdfPhotos.length > 0 || stampPhotos.length > 0) return "Data belum disimpan. Keluar?";
        };

        function toggleBackup(checkbox) {
            isBackupEnabled = checkbox.checked;
            document.querySelectorAll('.backup-toggle-checkbox').forEach(cb => cb.checked = isBackupEnabled);
            document.querySelectorAll('.backup-status-text').forEach(badge => {
                badge.innerText = isBackupEnabled ? 'Backup Aktif' : 'Backup Nonaktif';
                isBackupEnabled ? badge.classList.remove('disabled') : badge.classList.add('disabled');
            });
        }

        function switchTab(e, tab) {
            e.preventDefault();
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            e.currentTarget.classList.add('active');
            
            document.getElementById('page-home').classList.add('hidden');
            document.getElementById('page-settings').classList.add('hidden');
            document.getElementById('page-about').classList.add('hidden');
            
            if(tab === 'home') document.getElementById('page-home').classList.remove('hidden');
            else if(tab === 'settings') document.getElementById('page-settings').classList.remove('hidden');
            else if(tab === 'about') document.getElementById('page-about').classList.remove('hidden');
        }

        document.getElementById('cameraPDF').addEventListener('change', e => handleUpload(e, true, 'pdf'));
        document.getElementById('galleryPDF').addEventListener('change', e => handleUpload(e, false, 'pdf'));
        document.getElementById('cameraStamp').addEventListener('change', e => handleUpload(e, true, 'stamp'));

        async function handleUpload(e, isCamera, type) {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            showLoading(true, `Menyiapkan ${files.length} foto...`);
            for (let i = 0; i < files.length; i++) {
                showLoading(true, `Memproses ${i + 1} dari ${files.length}`);
                try {
                    const result = await processImage(files[i], isCamera, type);
                    if (type === 'pdf') pdfPhotos.push(result);
                    else stampPhotos.push(result);
                    renderPhotoGrid(type);
                } catch (err) { console.error("Gagal memproses gambar:", err); }
            }
            showLoading(false);
            e.target.value = '';
        }

        function autoBackupToDevice(blob, type) {
            if (!isBackupEnabled) return;
            const now = new Date();
            const ts = `${now.getHours()}${now.getMinutes()}${now.getSeconds()}`;
            const fileName = `Kamstamp_Backup_${type.toUpperCase()}_${ts}.jpg`;
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setTimeout(() => URL.revokeObjectURL(link.href), 100);
        }

        function processImage(file, isCamera, type) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX = 2048; 
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > MAX) { h *= MAX/w; w = MAX; } }
                        else { if (h > MAX) { w *= MAX/h; h = MAX; } }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d', { alpha: false });
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'medium'; 
                        ctx.drawImage(img, 0, 0, w, h);
                        if (isCamera) {
                            const now = new Date();
                            const dayName = days[now.getDay()];
                            const dateStr = `${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
                            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
                            const stamp = `${dayName}, ${dateStr} ${timeStr}`;
                            const fontSize = w > h ? Math.floor(w * 0.035) : Math.floor(w * 0.05); 
                            ctx.font = `bold ${fontSize}px 'Google Sans', sans-serif`;
                            ctx.textAlign = "center";
                            ctx.strokeStyle = "rgba(0,0,0,0.7)";
                            ctx.lineWidth = Math.max(1, fontSize / 8);
                            ctx.strokeText(stamp, w/2, h - (fontSize * 1.5));
                            ctx.fillStyle = "#00FF00";
                            ctx.fillText(stamp, w/2, h - (fontSize * 1.5));
                        }
                        const quality = 0.8; 
                        canvas.toBlob((blob) => {
                            if (isCamera) autoBackupToDevice(blob, type);
                            const previewUrl = URL.createObjectURL(blob);
                            resolve({
                                id: Date.now() + Math.random(),
                                preview: previewUrl, 
                                blob: blob,
                                ratio: w/h,
                                canvas: canvas
                            });
                        }, 'image/jpeg', quality);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function renderPhotoGrid(type) {
            const grid = document.getElementById(type === 'pdf' ? 'pdfPhotoGrid' : 'stampPhotoGrid');
            const list = type === 'pdf' ? pdfPhotos : stampPhotos;
            const countLabel = document.getElementById(type === 'pdf' ? 'pdfPhotoCount' : 'stampPhotoCount');
            grid.innerHTML = '';
            list.forEach(p => {
                const div = document.createElement('div');
                div.className = 'photo-chip';
                div.innerHTML = `
                    <img src="${p.preview}" class="w-full h-full object-cover">
                    <div onclick="removePhoto('${p.id}', '${type}')" class="delete-badge">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 -960 960 960"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg>
                    </div>`;
                grid.appendChild(div);
            });
            countLabel.innerText = list.length;
        }

        window.removePhoto = (id, type) => {
            const list = type === 'pdf' ? pdfPhotos : stampPhotos;
            const idx = list.findIndex(p => p.id == id);
            if (idx > -1) {
                URL.revokeObjectURL(list[idx].preview);
                if (type === 'pdf') pdfPhotos.splice(idx, 1);
                else stampPhotos.splice(idx, 1);
            }
            renderPhotoGrid(type);
        };

        window.clearAll = (type) => {
            const list = type === 'pdf' ? pdfPhotos : stampPhotos;
            if (list.length === 0) return;
            if (confirm(`Hapus semua (${list.length}) foto?`)) {
                list.forEach(p => URL.revokeObjectURL(p.preview));
                if (type === 'pdf') pdfPhotos = []; else stampPhotos = [];
                renderPhotoGrid(type);
            }
        };

        function showLoading(show, message = "Memproses Foto") { 
            const bar = document.getElementById('loadingBar');
            const overlay = document.getElementById('loadingOverlay');
            const progressText = document.getElementById('loadingProgress');
            if(show) {
                bar.style.width = '100%'; overlay.style.display = 'flex';
                progressText.innerText = message;
            } else {
                bar.style.width = '0%'; overlay.style.display = 'none';
            }
        }

        async function generatePDF() {
            if (!pdfPhotos.length) return;
            const btn = document.getElementById('btnPDF');
            btn.disabled = true;
            showLoading(true, "Menyusun PDF...");
            try {
                const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4', compress: true });
                const jobName = document.getElementById('jobName').value || 'Pekerjaan';
                const dateVal = document.getElementById('reportDate').value;
                const shift = document.getElementById('shift').value;
                const d = new Date(dateVal);
                const dayName = days[d.getDay()];
                const dateStr = `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
                const fileName = `${jobName} ${dayName} ${dateStr} ${shift}`.replace(/\s+/g, '_') + '.pdf';

                for (let i = 0; i < pdfPhotos.length; i++) {
                    showLoading(true, `Menyusun hal ${i+1} dari ${pdfPhotos.length}`);
                    const p = pdfPhotos[i];
                    if (i > 0) doc.addPage();
                    const pw = doc.internal.pageSize.getWidth();
                    const ph = doc.internal.pageSize.getHeight();
                    let dw = pw, dh = dw/p.ratio;
                    if (dh > ph) { dh = ph; dw = dh * p.ratio; }
                    doc.addImage(p.canvas.toDataURL('image/jpeg', 0.75), 'JPEG', (pw-dw)/2, (ph-dh)/2, dw, dh, undefined, 'FAST');
                }
                const pdfBlob = doc.output('blob');
                const pdfFile = new File([pdfBlob], fileName, { type: 'application/pdf' });
                if (navigator.share && navigator.canShare && navigator.canShare({ files: [pdfFile] })) {
                    await navigator.share({ files: [pdfFile], title: 'Laporan Pekerjaan' });
                } else { doc.save(fileName); }
            } catch (e) { console.error(e); }
            finally { btn.disabled = false; showLoading(false); }
        }

        async function shareStampedPhotos() {
            if (!stampPhotos.length) return;
            const btn = document.getElementById('btnShare');
            btn.disabled = true;
            showLoading(true, "Mempersiapkan foto...");
            try {
                const now = new Date();
                const files = stampPhotos.map((p, i) => new File([p.blob], `Foto_Pohara_${now.getTime()}_${i}.jpg`, {type: 'image/jpeg'}));
                if (navigator.share && navigator.canShare && navigator.canShare({files})) {
                    await navigator.share({ files: files, title: 'Foto Stempel' });
                } else {
                    files.forEach(file => {
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(file); a.download = file.name; a.click();
                        URL.revokeObjectURL(a.href);
                    });
                }
            } catch (e) { console.error(e); }
            finally { btn.disabled = false; showLoading(false); }
        }
    </script>
